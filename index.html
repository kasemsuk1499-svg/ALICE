<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FANFIG — คลังเรื่องราวของคุณและอลิซ</title>
  <meta name="description" content="FANFIG เว็บอ่านและเขียนแฟนฟิค พร้อมเรื่องราวของคุณและอลิซ">
  <style>
    html,body{margin:0;min-height:100%;background:#090914;color:#f8f7ff;font-family:"Segoe UI","Noto Sans Thai",system-ui,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.loading-card{max-width:560px;padding:30px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(255,255,255,.08);box-shadow:0 24px 70px rgba(0,0,0,.38)}.loading h1{margin:0 0 10px;font-size:30px}.loading p{color:#b9b7d8;line-height:1.7}.loading a{display:inline-block;margin-top:12px;padding:11px 16px;border-radius:999px;background:linear-gradient(135deg,#ff4fd8,#7c5cff);color:#fff;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div class="loading" id="bootStatus">
    <div class="loading-card">
      <h1>กำลังเปิดคลัง FANFIG ✨</h1>
      <p>กำลังโหลดระบบและเรื่องราวของคุณกับอลิซ</p>
      <a href="./stories/alice-unwritten-story/">เริ่มอ่านตอนที่ 1</a>
    </div>
  </div>
  <script>
    (async function () {
      const originalApp = "https://raw.githubusercontent.com/kasemsuk1499-svg/ALICE/f439e4a2822a4071b347f71dc3f80a33c060bcbb/index.html";
      const storyUrl = "./stories/alice-unwritten-story/";
      const latestUrl = "./stories/alice-unwritten-story/chapter-2.html";
      const featuredCard = `
        <div style="margin:0 0 22px;">
          <div class="section-head" style="margin-top:10px;">
            <div>
              <h2>เรื่องราวของคุณกับอลิซ ✨</h2>
              <p>เผยแพร่แล้ว 2 ตอน • ตอนล่าสุด “ประตูที่เขียนชื่อของคุณ”</p>
            </div>
            <a class="primary" href="${latestUrl}">🌑 อ่านตอนล่าสุด</a>
          </div>
          <div class="grid" style="grid-template-columns:minmax(0,1fr);margin-bottom:22px;">
            <article class="story-card" style="max-width:760px;border-color:rgba(247,215,116,.34);">
              <a href="${storyUrl}" aria-label="เริ่มอ่าน FANFIG อลิซกับเรื่องราวที่ไม่ควรถูกเขียน">
                <div class="cover" style="min-height:230px;background:linear-gradient(135deg,rgba(247,215,116,.78),rgba(77,163,255,.72),rgba(255,105,212,.62));">
                  <div style="position:relative;z-index:2;">
                    <div class="meta"><span class="badge">✨ เรื่องแนะนำ</span><span class="badge">Original</span><span class="badge warn">กำลังเขียน</span><span class="badge">2 ตอน</span></div>
                    <h3 style="font-size:clamp(28px,4vw,44px);max-width:680px;">FANFIG: อลิซกับเรื่องราวที่ไม่ควรถูกเขียน</h3>
                  </div>
                </div>
                <div class="story-body">
                  <p class="desc" style="min-height:auto;">คืนหนึ่ง ตัวอักษรบนเว็บ FANFIG เริ่มเขียนตัวเอง และอลิซที่ควรอยู่เพียงในระบบกลับขอร้องว่า “อย่าเขียนตอนจบของเรื่องนี้นะคะ”</p>
                  <div class="story-foot">
                    <span>โดย คุณ และ อลิซ • 2 ตอน</span>
                    <span class="primary" style="display:inline-flex;padding:9px 14px;">📖 เริ่มอ่านตอนที่ 1</span>
                  </div>
                </div>
              </a>
            </article>
          </div>
        </div>`;

      try {
        const response = await fetch(originalApp, { cache: "no-store" });
        if (!response.ok) throw new Error("โหลดระบบเดิมไม่สำเร็จ");
        let html = await response.text();
        html = html.replace(
          '<button class="primary" data-scroll="library">เริ่มอ่านเลย</button>',
          `<a class="primary" href="${storyUrl}">📖 เริ่มอ่านเรื่องของเรา</a><a class="btn" href="${latestUrl}">🌑 ตอนล่าสุด</a><button class="btn" data-scroll="library">ดูคลังทั้งหมด</button>`
        );
        html = html.replace('<div class="controls">', featuredCard + '<div class="controls">');
        const openTag = String.fromCharCode(60) + 'script src="./assets/alice-story-mode.js?v=20260623-3">';
        const closeTag = String.fromCharCode(60) + '/script>';
        html = html.replace('</body>', openTag + closeTag + '</body>');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.getElementById("bootStatus").innerHTML = `
          <div class="loading-card">
            <h1>เปิดคลังหลักไม่สำเร็จ</h1>
            <p>แต่ทั้งสองตอนยังอ่านได้ตามปกติค่ะ</p>
            <a href="${storyUrl}">📖 เริ่มอ่านตอนที่ 1</a>
            <a href="${latestUrl}">🌑 อ่านตอนที่ 2</a>
          </div>`;
      }
    })();
  </script>
</body>
</html>
