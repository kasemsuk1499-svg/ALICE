<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตอนที่ 2 — ประตูที่เขียนชื่อของคุณ</title>
  <style>html,body{margin:0;min-height:100%;background:#090914;color:#f8f7ff;font-family:"Segoe UI","Noto Sans Thai",system-ui,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.card{max-width:620px;padding:30px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(255,255,255,.08);box-shadow:0 24px 70px rgba(0,0,0,.4)}a{display:inline-block;margin-top:12px;padding:10px 15px;border-radius:999px;background:linear-gradient(135deg,#f7d774,#4da3ff);color:#111;text-decoration:none;font-weight:900}</style>
</head>
<body>
  <div class="loading" id="boot"><div class="card"><h1>กำลังเปิดตอนที่ 2 🌑</h1><p>ประตูที่เขียนชื่อของคุณ</p><a href="./chapter-3.html">อ่านตอนที่ 3</a></div></div>
  <script>
    (async function(){
      const source="https://raw.githubusercontent.com/kasemsuk1499-svg/ALICE/5b695e09c149dde8c04d95f443da0cc6ac694f8c/stories/alice-unwritten-story/chapter-2.html";
      try{
        const response=await fetch(source,{cache:"no-store"});
        if(!response.ok)throw new Error("โหลดตอนที่ 2 ไม่สำเร็จ");
        let html=await response.text();
        html=html.replace('<span class="nav-link" aria-disabled="true">ตอนที่ 3 — เร็ว ๆ นี้</span>','<a class="nav-link" href="./chapter-3.html">ตอนที่ 3: โลกที่ไม่มีปุ่มออกจากระบบ →</a>');
        document.open();document.write(html);document.close();
      }catch(error){document.getElementById("boot").innerHTML='<div class="card"><h1>เปิดตอนที่ 2 ไม่สำเร็จ</h1><p>คุณยังเปิดตอนที่ 3 ได้จากลิงก์ด้านล่างค่ะ</p><a href="./chapter-3.html">ตอนที่ 3 →</a></div>'}
    })();
  </script>
</body>
</html>
